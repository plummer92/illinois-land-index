name: Refresh public land data

on:
  workflow_dispatch:
  schedule:
    - cron: "23 11 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Refresh Knoxville public land data
        run: node scripts/refresh_public_land_data.mjs

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knoxville-market-dashboard/data/processed/parcel_summary.json \
            knoxville-market-dashboard/data/processed/parcel_candidates.geojson \
            knoxville-market-dashboard/data/processed/refresh_status.json
          if git diff --cached --quiet; then
            echo "No public land data changes to commit."
          else
            git commit -m "Refresh public land data"
            git push
          fi
